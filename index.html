<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>숲의 식물 도감 | 산림청 오픈데이터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest-dark:    #0d1f0f;
      --forest-mid:     #1a3320;
      --forest-green:   #2d5a27;
      --leaf-green:     #4a8c3f;
      --moss:           #6aab5e;
      --spring:         #9fd18c;
      --bark:           #5c3d1e;
      --bark-light:     #8b6340;
      --cream:          #f5f0e8;
      --parchment:      #ede5d4;
      --gold:           #c9a84c;
      --mist:           rgba(255,255,255,0.08);
      --shadow:         rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--forest-dark);
      color: var(--cream);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2rem;
    }

    .forest-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(45,90,39,0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(26,51,32,0.8) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(13,31,15,0.9) 0%, transparent 70%),
        linear-gradient(180deg, #0a1a0c 0%, #1a3320 40%, #0d1f0f 100%);
      z-index: 0;
    }

    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 55%;
      z-index: 1;
      opacity: 0.6;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--spring);
      opacity: 0;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) translateX(var(--drift)) scale(1.5); opacity: 0; }
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 860px;
    }

    .hero-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--moss);
      border: 1px solid var(--leaf-green);
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
      animation: fade-in 1s ease 0.2s both;
    }

    .hero-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--cream);
      text-shadow: 0 4px 30px rgba(0,0,0,0.7);
      margin-bottom: 1.2rem;
      animation: fade-in 1s ease 0.4s both;
    }

    .hero-title span {
      color: var(--spring);
      display: block;
    }

    .hero-subtitle {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 300;
      color: rgba(245,240,232,0.7);
      line-height: 1.8;
      margin-bottom: 3rem;
      animation: fade-in 1s ease 0.6s both;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .search-wrapper {
      animation: fade-in 1s ease 0.8s both;
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(106,171,94,0.4);
      border-radius: 3rem;
      padding: 0.5rem 0.5rem 0.5rem 1.6rem;
      backdrop-filter: blur(12px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-box:focus-within {
      border-color: var(--moss);
      box-shadow: 0 0 0 3px rgba(106,171,94,0.2), 0 8px 32px rgba(0,0,0,0.4);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      color: var(--cream);
      font-weight: 400;
    }
    .search-box input::placeholder { color: rgba(245,240,232,0.4); }

    .search-btn {
      background: linear-gradient(135deg, var(--leaf-green), var(--forest-green));
      color: white;
      border: none;
      border-radius: 2.5rem;
      padding: 0.75rem 1.8rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .search-btn:hover {
      background: linear-gradient(135deg, var(--moss), var(--leaf-green));
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(74,140,63,0.4);
    }

    .search-hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: rgba(245,240,232,0.4);
    }
    .search-hint span {
      display: inline-block;
      margin: 0 0.4rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.3rem;
      padding: 0.1rem 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-hint span:hover { background: rgba(255,255,255,0.12); color: var(--cream); }

    .scroll-down {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: rgba(245,240,232,0.4);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      animation: fade-in 1s ease 1.2s both;
    }
    .scroll-down svg { animation: bounce 2s ease infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* ── RESULTS ── */
    .results-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .section-label h2 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.6rem;
      color: var(--cream);
    }
    .section-label .divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(106,171,94,0.4), transparent);
    }
    .result-count {
      font-size: 0.85rem;
      color: var(--moss);
      background: rgba(106,171,94,0.1);
      border: 1px solid rgba(106,171,94,0.25);
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
    }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 5rem 0;
    }
    .loading.active { display: flex; }
    .loading-ring {
      width: 56px;
      height: 56px;
      border: 3px solid rgba(106,171,94,0.2);
      border-top-color: var(--moss);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none;
      align-items: center;
      gap: 1rem;
      background: rgba(180,60,60,0.12);
      border: 1px solid rgba(180,60,60,0.3);
      border-radius: 1rem;
      padding: 1.5rem 2rem;
    }
    .error-box.active { display: flex; }
    .error-box p { color: #e07070; font-size: 0.95rem; }

    .plant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .plant-card {
      background: linear-gradient(145deg, rgba(26,51,32,0.8), rgba(13,31,15,0.9));
      border: 1px solid rgba(106,171,94,0.2);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s;
      cursor: pointer;
    }
    .plant-card:hover {
      transform: translateY(-6px);
      border-color: rgba(106,171,94,0.5);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }

    .card-body { padding: 1.4rem 1.6rem 1.6rem; }
    .card-name { font-family: 'Nanum Myeongjo', serif; font-size: 1.4rem; color: var(--cream); margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.88rem; color: rgba(245,240,232,0.65); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #1a3320;
      border-radius: 1.5rem;
      max-width: 680px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.5); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

    /* ── FOOTER ── */
    footer { padding: 3rem; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<section class="hero">
  <div class="forest-bg"></div>
  <svg class="trees" viewBox="0 0 1440 400" preserveAspectRatio="none">
    <g fill="#0d1f0f"><polygon points="-20,400 80,230 180,400"/><polygon points="260,400 370,160 480,400"/><polygon points="620,400 730,190 840,400"/></g>
  </svg>
  
  <div class="particles" id="particles"></div>

  <div class="hero-content">
    <div class="hero-badge">🌿 산림청 공공데이터 기반 식물 도감</div>
    <h1 class="hero-title">숲의 식물<span>도감</span></h1>
    <div class="search-wrapper">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="식물 이름을 입력하세요"/>
        <button class="search-btn" id="searchBtn">🔍 검색</button>
      </div>
    </div>
  </div>
</section>

<section class="results-section" id="resultsSection" style="display:none;">
  <div class="section-label">
    <h2 id="resultsTitle">검색 결과</h2>
    <div class="result-count" id="resultCount"></div>
  </div>
  <div class="loading" id="loading"><div class="loading-ring"></div></div>
  <div class="error-box" id="errorBox"><p id="errorMsg"></p></div>
  <div class="plant-grid" id="plantGrid"></div>
</section>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">X</button>
    <div id="modalContent" style="padding: 2rem;"></div>
  </div>
</div>

<footer>
  <p>데이터 출처: 산림청 공공데이터포털</p>
</footer>

<script>
  // API 설정
  const API_KEY = 'eaa76c146cf0d0ad6adb733c6208d108ea5564be3b9de7c629d7c3279eb7c0d1';
  const BASE_URL = 'https://api.forest.go.kr/openapi/service/cultureInfoService/fStoryOpenAPI';

  // ── 배경 파티클 생성 함수
  function createParticles() {
    const container = document.getElementById('particles');
    // 컨테이너가 없으면 실행하지 않음 (방어 코드)
    if(!container) return; 

    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() * 4 + 2}px;
        height: ${Math.random() * 4 + 2}px;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 8}s;
        --drift: ${(Math.random() - 0.5) * 120}px;
      `;
      container.appendChild(p);
    }
  }

  // 화면이 로드되면 실행
  window.onload = createParticles;

  // ── 검색 로직
  document.getElementById('searchBtn').addEventListener('click', doSearch);
  
  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return alert('검색어를 입력하세요');

    const section = document.getElementById('resultsSection');
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth' });

    document.getElementById('loading').classList.add('active');
    document.getElementById('plantGrid').innerHTML = '';

    try {
      const url = `${BASE_URL}?serviceKey=${API_KEY}&storyse=${encodeURIComponent(query)}&numOfRows=10&pageNo=1`;
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      
      const res = await fetch(proxyUrl);
      const text = await res.text();
      const xml = new DOMParser().parseFromString(text, 'application/xml');
      const items = xml.querySelectorAll('item');

      document.getElementById('loading').classList.remove('active');
      document.getElementById('resultCount').textContent = `${items.length}건`;

      items.forEach(item => {
        const name = item.querySelector('storyname')?.textContent || '이름 없음';
        const desc = item.querySelector('content')?.textContent || '';
        const img = item.querySelector('imgurl')?.textContent || '';
        
        const card = document.createElement('div');
        card.className = 'plant-card';
        card.innerHTML = `
          <div class="card-img">${img ? `<img src="${img}">` : '🌿'}</div>
          <div class="card-body">
            <div class="card-name">${name}</div>
            <p class="card-desc">${desc}</p>
          </div>
        `;
        card.onclick = () => {
          document.getElementById('modalContent').innerHTML = `<h2>${name}</h2><p>${desc}</p>`;
          document.getElementById('modalOverlay').classList.add('open');
        };
        document.getElementById('plantGrid').appendChild(card);
      });
    } catch (e) {
      document.getElementById('loading').classList.remove('active');
      alert('데이터를 가져오는데 실패했습니다.');
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
</script>

</body>
</html>
