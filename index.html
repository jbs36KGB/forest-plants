<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>숲의 식물 도감 | 산림청 오픈데이터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest-dark:   #0d1f0f;
      --forest-mid:    #1a3320;
      --forest-green:  #2d5a27;
      --leaf-green:    #4a8c3f;
      --moss:          #6aab5e;
      --spring:        #9fd18c;
      --bark:          #5c3d1e;
      --bark-light:    #8b6340;
      --cream:         #f5f0e8;
      --parchment:     #ede5d4;
      --gold:          #c9a84c;
      --mist:          rgba(255,255,255,0.08);
      --shadow:        rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--forest-dark);
      color: var(--cream);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2rem;
    }

    /* animated forest background */
    .forest-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(45,90,39,0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(26,51,32,0.8) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(13,31,15,0.9) 0%, transparent 70%),
        linear-gradient(180deg, #0a1a0c 0%, #1a3320 40%, #0d1f0f 100%);
      z-index: 0;
    }

    /* SVG tree silhouettes */
    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 55%;
      z-index: 1;
      opacity: 0.6;
    }

    /* floating particles */
    .particles {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--spring);
      opacity: 0;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) translateX(var(--drift)) scale(1.5); opacity: 0; }
    }

    /* hero text */
    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 860px;
    }

    .hero-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--moss);
      border: 1px solid var(--leaf-green);
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
      animation: fade-in 1s ease 0.2s both;
    }

    .hero-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--cream);
      text-shadow: 0 4px 30px rgba(0,0,0,0.7);
      margin-bottom: 1.2rem;
      animation: fade-in 1s ease 0.4s both;
    }

    .hero-title span {
      color: var(--spring);
      display: block;
    }

    .hero-subtitle {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 300;
      color: rgba(245,240,232,0.7);
      line-height: 1.8;
      margin-bottom: 3rem;
      animation: fade-in 1s ease 0.6s both;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SEARCH ── */
    .search-wrapper {
      animation: fade-in 1s ease 0.8s both;
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(106,171,94,0.4);
      border-radius: 3rem;
      padding: 0.5rem 0.5rem 0.5rem 1.6rem;
      backdrop-filter: blur(12px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-box:focus-within {
      border-color: var(--moss);
      box-shadow: 0 0 0 3px rgba(106,171,94,0.2), 0 8px 32px rgba(0,0,0,0.4);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      color: var(--cream);
      font-weight: 400;
    }
    .search-box input::placeholder { color: rgba(245,240,232,0.4); }

    .search-btn {
      background: linear-gradient(135deg, var(--leaf-green), var(--forest-green));
      color: white;
      border: none;
      border-radius: 2.5rem;
      padding: 0.75rem 1.8rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .search-btn:hover {
      background: linear-gradient(135deg, var(--moss), var(--leaf-green));
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(74,140,63,0.4);
    }
    .search-btn:active { transform: scale(0.98); }

    .search-hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: rgba(245,240,232,0.4);
    }
    .search-hint span {
      display: inline-block;
      margin: 0 0.4rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.3rem;
      padding: 0.1rem 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-hint span:hover { background: rgba(255,255,255,0.12); color: var(--cream); }

    /* scroll indicator */
    .scroll-down {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: rgba(245,240,232,0.4);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      animation: fade-in 1s ease 1.2s both;
    }
    .scroll-down svg { animation: bounce 2s ease infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* ── RESULTS SECTION ── */
    .results-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .section-label h2 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.6rem;
      color: var(--cream);
    }
    .section-label .divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(106,171,94,0.4), transparent);
    }
    .result-count {
      font-size: 0.85rem;
      color: var(--moss);
      background: rgba(106,171,94,0.1);
      border: 1px solid rgba(106,171,94,0.25);
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
    }

    /* loading */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 5rem 0;
    }
    .loading.active { display: flex; }
    .loading-ring {
      width: 56px;
      height: 56px;
      border: 3px solid rgba(106,171,94,0.2);
      border-top-color: var(--moss);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: rgba(245,240,232,0.5); font-size: 0.9rem; }

    /* error */
    .error-box {
      display: none;
      align-items: center;
      gap: 1rem;
      background: rgba(180,60,60,0.12);
      border: 1px solid rgba(180,60,60,0.3);
      border-radius: 1rem;
      padding: 1.5rem 2rem;
    }
    .error-box.active { display: flex; }
    .error-box svg { flex-shrink: 0; color: #e07070; }
    .error-box p { color: #e07070; font-size: 0.95rem; line-height: 1.6; }

    /* plant grid */
    .plant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* plant card */
    .plant-card {
      background: linear-gradient(145deg, rgba(26,51,32,0.8), rgba(13,31,15,0.9));
      border: 1px solid rgba(106,171,94,0.2);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
      animation: card-in 0.5s ease both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .plant-card:hover {
      transform: translateY(-6px);
      border-color: rgba(106,171,94,0.5);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(106,171,94,0.15);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0.4;
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
      justify-content: center;
    }
    .card-img-placeholder svg { width: 48px; height: 48px; }
    .card-img-placeholder span { font-size: 0.8rem; }

    .card-body {
      padding: 1.4rem 1.6rem 1.6rem;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.8rem;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.7rem;
      border-radius: 2rem;
      font-weight: 500;
    }
    .tag-season {
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.25);
    }
    .tag-type {
      background: rgba(106,171,94,0.12);
      color: var(--moss);
      border: 1px solid rgba(106,171,94,0.25);
    }

    .card-name {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 0.2rem;
    }
    .card-name-sci {
      font-size: 0.8rem;
      color: rgba(245,240,232,0.4);
      font-style: italic;
      margin-bottom: 0.9rem;
    }
    .card-desc {
      font-size: 0.88rem;
      color: rgba(245,240,232,0.65);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      margin-top: 1.2rem;
      display: flex;
      justify-content: flex-end;
    }
    .card-more {
      font-size: 0.8rem;
      color: var(--moss);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: gap 0.2s;
    }
    .plant-card:hover .card-more { gap: 0.6rem; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: linear-gradient(160deg, #1a3320, #0d1f0f);
      border: 1px solid rgba(106,171,94,0.3);
      border-radius: 1.5rem;
      max-width: 680px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.95) translateY(20px);
      transition: transform 0.3s;
      scrollbar-width: thin;
      scrollbar-color: var(--leaf-green) transparent;
    }
    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 1.5rem 1.5rem 0 0;
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 1.5rem 1.5rem 0 0;
    }
    .modal-img-placeholder {
      width: 100%;
      height: 260px;
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.4;
      border-radius: 1.5rem 1.5rem 0 0;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 10;
    }
    .modal-close:hover { background: rgba(0,0,0,0.7); }

    .modal-body {
      padding: 2rem 2.5rem 2.5rem;
    }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .modal-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--cream);
      margin-bottom: 0.3rem;
    }
    .modal-sci {
      font-size: 0.9rem;
      color: rgba(245,240,232,0.4);
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .info-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.8rem;
      padding: 0.9rem 1rem;
    }
    .info-label {
      font-size: 0.7rem;
      color: var(--moss);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
      font-weight: 500;
    }
    .info-value {
      font-size: 0.92rem;
      color: var(--cream);
      font-weight: 400;
    }

    .modal-desc-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.1rem;
      color: var(--spring);
      margin-bottom: 0.7rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(106,171,94,0.2);
    }
    .modal-desc {
      font-size: 0.92rem;
      color: rgba(245,240,232,0.75);
      line-height: 1.85;
    }

    /* empty state */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 5rem 0;
      text-align: center;
    }
    .empty-state.active { display: flex; }
    .empty-state svg { opacity: 0.3; }
    .empty-state h3 { font-family: 'Nanum Myeongjo', serif; font-size: 1.4rem; color: rgba(245,240,232,0.6); }
    .empty-state p { font-size: 0.9rem; color: rgba(245,240,232,0.35); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(106,171,94,0.15);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(245,240,232,0.3);
      line-height: 1.8;
    }
    footer a { color: var(--moss); text-decoration: none; }

    /* responsive */
    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      .modal-body { padding: 1.5rem; }
      .plant-grid { grid-template-columns: 1fr; }
    }

    /* scroll bar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--leaf-green); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ════════════ HERO ════════════ -->
<section class="hero">
  <div class="forest-bg"></div>

  <!-- tree silhouettes -->
  <svg class="trees" viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- far trees - lighter -->
    <g fill="#2d5a27" opacity="0.5">
      <polygon points="100,400 140,260 180,400"/>
      <polygon points="120,400 160,220 200,400"/>
      <polygon points="300,400 345,240 390,400"/>
      <polygon points="500,400 545,200 590,400"/>
      <polygon points="700,400 750,230 800,400"/>
      <polygon points="900,400 940,210 980,400"/>
      <polygon points="1100,400 1145,250 1190,400"/>
      <polygon points="1300,400 1345,220 1390,400"/>
    </g>
    <!-- mid trees -->
    <g fill="#1a3320" opacity="0.8">
      <polygon points="0,400 60,280 120,400"/>
      <polygon points="200,400 270,200 340,400"/>
      <polygon points="370,400 430,170 490,400"/>
      <polygon points="560,400 630,210 700,400"/>
      <polygon points="780,400 850,180 920,400"/>
      <polygon points="1000,400 1060,200 1120,400"/>
      <polygon points="1180,400 1250,170 1320,400"/>
      <polygon points="1380,400 1440,240 1500,400"/>
    </g>
    <!-- front trees - darkest -->
    <g fill="#0d1f0f">
      <polygon points="-20,400 80,230 180,400"/>
      <polygon points="260,400 370,160 480,400"/>
      <polygon points="620,400 730,190 840,400"/>
      <polygon points="950,400 1060,150 1170,400"/>
      <polygon points="1280,400 1380,200 1480,400"/>
    </g>
    <!-- ground -->
    <rect x="0" y="390" width="1440" height="10" fill="#0d1f0f"/>
  </svg>

  <!-- particles -->
  <div class="particles" id="particles"></div>

  <div class="hero-content">
    <div class="hero-badge">🌿 산림청 공공데이터 기반 식물 도감</div>
    <h1 class="hero-title">
      숲의 식물
      <span>도감</span>
    </h1>
    <p class="hero-subtitle">
      우리 숲에서 만날 수 있는 다양한 식물을 검색하고 탐험하세요.<br/>
      산림청이 제공하는 공공데이터로 식물의 이름, 특징, 생태 정보를 확인할 수 있습니다.
    </p>

    <div class="search-wrapper">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="식물 이름을 입력하세요 (예: 진달래)" autocomplete="off"/>
        <button class="search-btn" id="searchBtn">🔍 검색</button>
      </div>
      <p class="search-hint">
        추천 검색어:
        <span onclick="quickSearch('소나무')">소나무</span>
        <span onclick="quickSearch('진달래')">진달래</span>
        <span onclick="quickSearch('참나무')">참나무</span>
        <span onclick="quickSearch('고사리')">고사리</span>
        <span onclick="quickSearch('억새')">억새</span>
      </p>
    </div>
  </div>

  <div class="scroll-down">
    <span>아래로 스크롤</span>
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M19 9l-7 7-7-7"/>
    </svg>
  </div>
</section>

<!-- ════════════ RESULTS ════════════ -->
<section class="results-section" id="resultsSection" style="display:none;">
  <div class="section-label">
    <h2 id="resultsTitle">검색 결과</h2>
    <div class="divider"></div>
    <div class="result-count" id="resultCount"></div>
  </div>

  <!-- loading -->
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <p>숲에서 식물을 찾고 있습니다…</p>
  </div>

  <!-- error -->
  <div class="error-box" id="errorBox">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
    </svg>
    <p id="errorMsg"></p>
  </div>

  <!-- empty state -->
  <div class="empty-state" id="emptyState">
    <svg width="72" height="72" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
      <path d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
    </svg>
    <h3>식물을 찾지 못했어요</h3>
    <p>다른 이름으로 검색해보세요.</p>
  </div>

  <!-- grid -->
  <div class="plant-grid" id="plantGrid"></div>
</section>

<!-- ════════════ MODAL ════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- ════════════ FOOTER ════════════ -->
<footer>
  <p>데이터 출처: <a href="https://www.data.go.kr" target="_blank">공공데이터포털</a> · 산림청 숲에 사는 식물 정보(산림문화·휴양정보)</p>
  <p style="margin-top:0.3rem;">본 서비스는 산림청 오픈API를 활용하여 제작되었습니다.</p>
</footer>

<script>
  const API_KEY = 'eaa76c146cf0d0ad6adb733c6208d108ea5564be3b9de7c629d7c3279eb7c0d1';
  const BASE_URL = 'https://api.forest.go.kr/openapi/service/cultureInfoService/fStoryOpenAPI';

  // ── Particles
  (function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() * 4 + 2}px;
        height: ${Math.random() * 4 + 2}px;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 8}s;
        --drift: ${(Math.random() - 0.5) * 120}px;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  })();

  // ── Search
  document.getElementById('searchBtn').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function quickSearch(term) {
    document.getElementById('searchInput').value = term;
    doSearch();
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
  }

  let currentData = [];

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) {
      alert('식물 이름을 입력해주세요.');
      return;
    }

    const section = document.getElementById('resultsSection');
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    setLoading(true);
    clearResults();

    try {
      const url = `${BASE_URL}?serviceKey=${API_KEY}&numOfRows=20&pageNo=1&storyse=${encodeURIComponent(query)}`;
      
      // CORS 프록시 사용 (GitHub Pages에서 필요)
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`HTTP 오류: ${res.status}`);

      const text = await res.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'application/xml');

      // 오류 코드 확인
      const resultCode = xml.querySelector('resultCode')?.textContent;
      if (resultCode && resultCode !== '00' && resultCode !== '0000') {
        const resultMsg = xml.querySelector('resultMsg')?.textContent || '알 수 없는 오류';
        throw new Error(`API 오류: ${resultMsg}`);
      }

      const items = xml.querySelectorAll('item');
      currentData = Array.from(items).map(parseItem);

      setLoading(false);
      document.getElementById('resultsTitle').textContent = `"${query}" 검색 결과`;

      if (currentData.length === 0) {
        document.getElementById('emptyState').classList.add('active');
        document.getElementById('resultCount').textContent = '0건';
      } else {
        document.getElementById('resultCount').textContent = `${currentData.length}건`;
        renderCards(currentData);
      }

    } catch (err) {
      setLoading(false);
      showError(err.message);
    }
  }

  function parseItem(item) {
    const get = (tag) => item.querySelector(tag)?.textContent?.trim() || '';
    return {
      no:          get('no'),
      name:        get('storyname') || get('name') || get('plantNm') || '이름 없음',
      sciName:     get('sciname') || get('sciNm') || '',
      season:      get('season') || get('blosmtime') || '',
      type:        get('storyse') || get('type') || '',
      place:       get('place') || get('forest') || '',
      desc:        get('content') || get('desc') || get('description') || '',
      imgUrl:      get('imgurl') || get('img') || '',
      height:      get('height') || '',
      charct:      get('charct') || '',
      usePurps:    get('usepurps') || '',
      growEnv:     get('growenv') || '',
    };
  }

  function renderCards(plants) {
    const grid = document.getElementById('plantGrid');
    plants.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'plant-card';
      card.style.animationDelay = `${i * 0.07}s`;
      card.innerHTML = `
        ${p.imgUrl
          ? `<div class="card-img"><img src="${p.imgUrl}" alt="${p.name}" onerror="this.parentElement.innerHTML=plantholderHtml()"/></div>`
          : `<div class="card-img">${plantholderHtml()}</div>`
        }
        <div class="card-body">
          <div class="card-tags">
            ${p.season ? `<span class="tag tag-season">🌸 ${p.season}</span>` : ''}
            ${p.type ? `<span class="tag tag-type">${p.type}</span>` : ''}
          </div>
          <div class="card-name">${p.name}</div>
          ${p.sciName ? `<div class="card-name-sci">${p.sciName}</div>` : ''}
          <p class="card-desc">${p.desc || '상세 정보를 클릭해서 확인하세요.'}</p>
          <div class="card-footer">
            <span class="card-more">자세히 보기 →</span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openModal(p));
      grid.appendChild(card);
    });
  }

  function plantholderHtml() {
    return `<div class="card-img-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 22V12m0 0C12 6 6 4 3 7c3 0 7 2 9 5zm0 0c0-6 6-8 9-5-3 0-7 2-9 5"/>
      </svg>
      <span>이미지 없음</span>
    </div>`;
  }

  // ── Modal
  function openModal(p) {
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      ${p.imgUrl
        ? `<div class="modal-img"><img src="${p.imgUrl}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=modal-img-placeholder><svg viewBox=\\'0 0 24 24\\' width=\\'80\\' fill=\\'none\\' stroke=\\'white\\' stroke-width=\\'1\\'><path d=\\'M12 22V12m0 0C12 6 6 4 3 7c3 0 7 2 9 5zm0 0c0-6 6-8 9-5-3 0-7 2-9 5\\'/></svg></div>'"/></div>`
        : `<div class="modal-img-placeholder" style="height:260px"><svg viewBox="0 0 24 24" width="80" fill="none" stroke="white" stroke-width="1"><path d="M12 22V12m0 0C12 6 6 4 3 7c3 0 7 2 9 5zm0 0c0-6 6-8 9-5-3 0-7 2-9 5"/></svg></div>`
      }
      <div class="modal-body">
        <div class="modal-tags">
          ${p.season ? `<span class="tag tag-season">🌸 ${p.season}</span>` : ''}
          ${p.type ? `<span class="tag tag-type">${p.type}</span>` : ''}
        </div>
        <div class="modal-title">${p.name}</div>
        ${p.sciName ? `<div class="modal-sci">${p.sciName}</div>` : ''}

        <div class="info-grid">
          ${p.height   ? infoItem('키/크기', p.height) : ''}
          ${p.place    ? infoItem('서식지', p.place) : ''}
          ${p.usePurps ? infoItem('이용 방법', p.usePurps) : ''}
          ${p.growEnv  ? infoItem('생육 환경', p.growEnv) : ''}
          ${p.charct   ? infoItem('특징', p.charct) : ''}
        </div>

        ${p.desc ? `
          <div class="modal-desc-title">📖 상세 설명</div>
          <p class="modal-desc">${p.desc}</p>
        ` : ''}
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function infoItem(label, value) {
    return `<div class="info-item"><div class="info-label">${label}</div><div class="info-value">${value}</div></div>`;
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Helpers
  function setLoading(on) {
    document.getElementById('loading').classList.toggle('active', on);
  }
  function clearResults() {
    document.getElementById('plantGrid').innerHTML = '';
    document.getElementById('errorBox').classList.remove('active');
    document.getElementById('emptyState').classList.remove('active');
    document.getElementById('resultCount').textContent = '';
  }
  function showError(msg) {
    const box = document.getElementById('errorBox');
    document.getElementById('errorMsg').textContent = `오류가 발생했습니다: ${msg}`;
    box.classList.add('active');
  }
</script>
</body>
</html>
