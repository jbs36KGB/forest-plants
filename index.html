<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숲 식물 검색</title>
<style>
body {
  background:#0d1f0f;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding:50px;
}
input {
  padding:10px;
  width:250px;
}
button {
  padding:10px;
}
.card {
  background:#1a3320;
  margin:15px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>
<body>

<h1>🌿 숲 식물 검색</h1>

<input id="searchInput" placeholder="식물 이름 입력">
<button onclick="search()">검색</button>

<div id="result"></div>

<script>
const API_KEY = "eaa76c146cf0d0ad6adb733c6208d108ea5564be3b9de7c629d7c3279eb7c0d1";
const BASE_URL = "https://api.forest.go.kr/openapi/service/cultureInfoService/fStoryOpenAPI";

async function search() {
  const query = document.getElementById("searchInput").value;
  if (!query) {
    alert("검색어 입력해라");
    return;
  }

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "불러오는 중...";

  try {
    const url = `${BASE_URL}?serviceKey=${API_KEY}&numOfRows=10&pageNo=1&searchWord=${encodeURIComponent(query)}`;

    // 👉 프록시 변경 (이게 핵심 수정)
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.querySelectorAll("item");

    if (items.length === 0) {
      resultDiv.innerHTML = "결과 없음";
      return;
    }

    let html = "";

    items.forEach(item => {
      const name = item.querySelector("storyname")?.textContent || "이름 없음";
      const desc = item.querySelector("content")?.textContent || "";

      html += `
        <div class="card">
          <h3>${name}</h3>
          <p>${desc}</p>
        </div>
      `;
    });

    resultDiv.innerHTML = html;

  } catch (err) {
    resultDiv.innerHTML = "에러 발생: " + err.message;
  }
}
</script>

</body>
</html>
